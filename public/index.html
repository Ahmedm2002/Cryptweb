<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Io Server</title>
  </head>
  <body>
    <h1>Socket Server</h1>
    <p>Socket Id: <span id="socket-id"></span></p>
    <p>Connection Status: <span id="connection-status">Connecting...</span></p>
    <script src="/socket.io/socket.io.js"></script>
    <script>
      const socket = io();
      socket.on("connect", () => {
        document.getElementById("socket-id").textContent = socket.id;
        document.getElementById("connection-status").textContent = "Connected";
      });
      socket.on("connect_error", (error) => {
        document.getElementById("connection-status").textContent =
          "Connection Error: " + error.message;
      });
      socket.on("disconnect", () => {
        document.getElementById("socket-id").textContent = "Disconnected";
      });
    </script>
  </body>
</html>
